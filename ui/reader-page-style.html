.rr{height:100vh;box-sizing:border-box;column-fill:auto;overflow-wrap:break-word;word-break:break-word;text-align:justify;orphans:1 !important;widows:1 !important;-webkit-line-box-contain:block glyphs replaced}
.rr img{max-width:100%;max-height:86vh;height:auto}
/* 任何内容都不得超过一栏宽，否则该栏会变宽、后续页码错位导致正文整体右移 */
.rr *{max-width:100%}
.rr pre{white-space:pre-wrap;word-break:break-word}
.rr table{table-layout:fixed;width:100%}
.rr-note-list{margin-left:0 !important;padding-left:0 !important;list-style:none !important}
.rr-note-list>li{display:block;margin-left:0 !important;padding-left:0 !important;list-style:none !important}
.rr-note-list .rr-note-num{float:left;min-width:0;margin-right:.28em}
.rr-note-body{display:block;min-width:0}
.rr-note-body>:first-child{margin-top:0 !important}
.rr-note-num{display:inline-block;box-sizing:border-box;margin-right:.28em;text-align:left;color:inherit;text-decoration:none}
#virtual-page .vp-note-num{box-sizing:border-box;text-align:left;overflow:visible}
/* markdown 渲染样式 */
.md-body h1{font-size:1.6em;margin:.6em 0 .4em;font-weight:700;line-height:1.3}
.md-body h2{font-size:1.35em;margin:.6em 0 .4em;font-weight:700;line-height:1.3}
.md-body h3{font-size:1.15em;margin:.5em 0 .3em;font-weight:700}
.md-body h4,.md-body h5,.md-body h6{margin:.5em 0 .3em;font-weight:700}
.md-body p{margin:.5em 0}
.md-body ul,.md-body ol{margin:.4em 0;padding-left:1.6em}
.md-body li{margin:.2em 0}
.md-body blockquote{margin:.6em 0;padding:.2em .9em;border-left:3px solid #bbb;color:#666}
.md-body code{font-family:Consolas,Menlo,monospace;background:rgba(135,131,120,.15);border-radius:4px;padding:.1em .3em;font-size:.92em}
.md-body pre{background:rgba(135,131,120,.12);border-radius:6px;padding:.7em .9em;overflow:auto;white-space:pre-wrap}
.md-body pre code{background:none;padding:0}
.md-body a{color:#2b6cff;text-decoration:none}
.md-body hr{border:none;border-top:1px solid #ccc;margin:1em 0}
.md-body table{border-collapse:collapse;width:auto}
.md-body th,.md-body td{border:1px solid #ccc;padding:4px 8px}
.md-body h1,.md-body h2,.md-body h3{break-after:avoid;-webkit-column-break-after:avoid}
body.theme-dark .md-body blockquote{color:#aaa;border-color:#555}
body.theme-dark .md-body code,body.theme-dark .md-body pre{background:rgba(255,255,255,.08)}
body.theme-dark .md-body hr{border-color:#444}
body.theme-dark .md-body th,body.theme-dark .md-body td{border-color:#555}
/* MOBI/AZW3：内容本就是 HTML；按记录号引用的图片无法解析 src，隐藏避免破图 */
.mobi-body img:not([src]){display:none}
.mobi-body p{margin:.5em 0}
.rr-end{break-before:column;-webkit-column-break-before:always;width:1px;height:1px;font-size:0}
#measurer{position:fixed;left:-99999px;top:0;overflow:hidden;pointer-events:none}
mark.search-hit{background:#ffe58a;color:inherit}
::highlight(tts){background:#ffd54a;color:#111}
mark.search-hit.cur{background:#ff9f40}
mark.hl{display:inline;margin:0;padding:0;border:0;background:linear-gradient(to bottom,transparent 58%,rgba(255,218,92,.34) 58%,rgba(255,218,92,.34) 88%,transparent 88%);color:inherit;border-radius:2px;cursor:pointer;box-shadow:none;font:inherit;line-height:inherit;letter-spacing:inherit;word-spacing:inherit;vertical-align:baseline;-webkit-box-decoration-break:clone;box-decoration-break:clone}
mark.hl.has-note{box-shadow:none}
#sel-menu{position:fixed;display:none;z-index:99999;max-width:calc(100vw - 12px);line-height:30px}
#sel-menu button{font:12px/1 system-ui,'Microsoft YaHei',sans-serif;color:#4a463e;background:#faf8f2;border:1px solid #e4ddcd;border-radius:6px;padding:5px 9px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.14);white-space:nowrap;margin-top:2px;margin-bottom:2px}
#sel-menu button:hover{background:#f1ebdc}
#sel-menu button+button{margin-left:4px}
#hl-menu{position:fixed;display:none;z-index:99999;max-width:calc(100vw - 12px);line-height:30px}
#hl-menu button{font:12px/1 system-ui,'Microsoft YaHei',sans-serif;color:#4a463e;background:#faf8f2;border:1px solid #e4ddcd;border-radius:6px;padding:5px 9px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.14);white-space:nowrap;margin-top:2px;margin-bottom:2px}
#hl-menu button:hover{background:#f1ebdc}
#hl-menu button+button{margin-left:4px}
#sel-menu.hm-size-medium button,#hl-menu.hm-size-medium button{font-size:13px;padding:7px 11px;border-radius:7px}
#sel-menu.hm-size-large button,#hl-menu.hm-size-large button{font-size:14px;padding:9px 13px;border-radius:8px}
#sel-menu.hm-size-medium button+button,#hl-menu.hm-size-medium button+button{margin-left:5px}
#sel-menu.hm-size-large button+button,#hl-menu.hm-size-large button+button{margin-left:6px}
#hl-settings-pop{position:fixed;display:none;z-index:100003;width:340px;max-width:calc(100vw - 18px);max-height:min(420px,calc(100vh - 18px));overflow:auto;background:#fff;border:1px solid #e1e1e8;border-radius:12px;box-shadow:0 10px 28px rgba(0,0,0,.24);box-sizing:border-box;padding:12px 12px 14px;font-family:system-ui,'Microsoft YaHei',sans-serif;color:#222}
#hl-settings-pop .hs-title{font-size:14px;font-weight:700;margin:0 38px 10px 2px}
#hl-settings-pop .hs-close{position:absolute;right:8px;top:8px;width:28px;height:28px;border:1px solid #d8d8de;border-radius:7px;background:#fff;color:#333;font:20px/1 system-ui,'Microsoft YaHei',sans-serif;cursor:pointer}
#hl-settings-pop .hs-close:hover{background:#f2f2f5}
#hl-settings-pop .hs-mode{height:38px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;margin-bottom:8px;padding:0 8px;border:1px solid #ececf1;border-radius:9px;background:#fbfbfd;box-sizing:border-box}
#hl-settings-pop .hs-mode-label{font-size:13px;color:#555}
#hl-settings-pop .hs-mode-buttons{display:inline-flex;border:1px solid #d8d8de;border-radius:8px;overflow:hidden;background:#fff}
#hl-settings-pop .hs-mode-buttons button{height:26px;min-width:42px;border:0;border-right:1px solid #d8d8de;background:#fff;color:#555;font:12px/1 system-ui,'Microsoft YaHei',sans-serif;cursor:pointer}
#hl-settings-pop .hs-mode-buttons button:last-child{border-right:0}
#hl-settings-pop .hs-mode-buttons button.on{background:#222;color:#fff}
#hl-settings-pop .hs-list{display:flex;flex-direction:column;gap:6px}
#hl-settings-pop .hs-row{height:40px;display:grid;grid-template-columns:1fr 42px 30px;align-items:center;gap:8px;padding:0 8px;border:1px solid #ececf1;border-radius:9px;background:#fbfbfd;box-sizing:border-box;transition:transform .18s cubic-bezier(.2,.8,.2,1),background .16s ease,border-color .16s ease,box-shadow .16s ease;user-select:none}
#hl-settings-pop .hs-row.dragging{background:#fff;border-color:#d6d8de;box-shadow:0 10px 24px rgba(0,0,0,.16);opacity:.98;z-index:100004}
#hl-settings-pop .hs-placeholder{height:40px;border:1px dashed #d9dbe2;border-radius:9px;background:#f6f7f9;box-sizing:border-box}
#hl-settings-pop .hs-name{font-size:13px;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#hl-settings-pop .hs-switch{position:relative;display:inline-block;width:38px;height:20px}
#hl-settings-pop .hs-switch input{opacity:0;width:0;height:0}
#hl-settings-pop .hs-slider{position:absolute;inset:0;background:#cfcfd6;border-radius:20px;transition:.16s;cursor:pointer}
#hl-settings-pop .hs-slider:before{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.16s;box-shadow:0 1px 3px rgba(0,0,0,.28)}
#hl-settings-pop .hs-switch input:checked+.hs-slider{background:#222}
