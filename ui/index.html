<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电子书阅读器 - 书架</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div id="del-group" class="del-group">
        <button id="del-btn" class="btn-danger">🗑 删除选中 (0)</button>
        <button id="del-cancel" class="btn-plain">取消</button>
      </div>
      <div class="search-wrap" id="search-wrap">
        <button id="search-btn" class="icon-btn" title="搜索书籍">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
            <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <div class="sbox">
          <input id="search-input" class="search-input" type="text" autocomplete="off" placeholder="搜索 书名 / 作者 / 简介" />
          <div id="search-history" class="search-history"></div>
        </div>
        <label class="shelf-toggle" id="shelf-toggle" title="勾选后回车，对全书架正文做检索">
          <input type="checkbox" id="shelf-search-chk" /> 书架搜索
        </label>
      </div>
      <div class="filter-wrap">
        <button id="filter-btn" class="icon-btn" title="排序与布局">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M3 5h18l-7 8v6l-4-2v-4z" fill="currentColor" />
          </svg>
        </button>
        <div id="filter-panel" class="filter-panel">
          <div class="fp-col">
            <div class="fp-title">排序</div>
            <label><input type="radio" name="sort" value="title" /> 书名</label>
            <label><input type="radio" name="sort" value="author" /> 作者</label>
            <label><input type="radio" name="sort" value="added" /> 导入时间</label>
            <label><input type="radio" name="sort" value="read" /> 最近阅读</label>
          </div>
          <div class="fp-sep"></div>
          <div class="fp-col">
            <div class="fp-title">布局</div>
            <div class="layout-row">
              <button class="layout-btn" data-layout="list" title="横向列表">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="2.4" fill="currentColor" />
                  <rect x="3" y="10.8" width="18" height="2.4" fill="currentColor" />
                  <rect x="3" y="16.6" width="18" height="2.4" fill="currentColor" />
                </svg>
              </button>
              <button class="layout-btn" data-layout="grid" title="网格">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <rect x="3" y="3" width="8" height="8" fill="currentColor" />
                  <rect x="13" y="3" width="8" height="8" fill="currentColor" />
                  <rect x="3" y="13" width="8" height="8" fill="currentColor" />
                  <rect x="13" y="13" width="8" height="8" fill="currentColor" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="menu-wrap">
        <button id="menu-btn" class="icon-btn" title="菜单">⋮</button>
        <div id="menu" class="menu">
          <div class="menu-item" id="mi-random">🎲 随机打开一本书</div>
          <div class="menu-item" id="mi-import">➕ 导入书籍</div>
          <div class="menu-item" id="mi-stats">📊 阅读统计</div>
          <div class="menu-item" id="mi-selectall">☑ 全选（批量删除）</div>
        </div>
      </div>
    </header>
    <div id="stats-modal" class="modal">
      <div class="modal-card">
        <div class="modal-head"><span>📊 阅读统计</span><button id="stats-close" class="btn-plain">✕</button></div>
        <div class="info-row"><span class="info-k">阅读时长</span><span id="st-time" class="info-v"></span></div>
        <div class="info-row"><span class="info-k">已读字数</span><span id="st-words" class="info-v"></span></div>
        <div class="info-row"><span class="info-k">在读</span><span id="st-started" class="info-v"></span></div>
        <div class="info-row"><span class="info-k">读完</span><span id="st-finished" class="info-v"></span></div>
        <div class="info-row"><span class="info-k">藏书</span><span id="st-total" class="info-v"></span></div>
      </div>
    </div>
    <div id="drop-hint" class="drop-hint">松开即可导入书籍</div>
    <div class="content">
      <main id="shelf" class="shelf"></main>
      <div id="empty" class="empty">书架还是空的。点右上角「⋮」→「导入书籍」添加（可一次选多本）。</div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
