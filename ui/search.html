<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书架全文检索</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: "Microsoft YaHei", system-ui, sans-serif; color: #222; background: #f6f6f8;
        display: flex; flex-direction: column; height: 100vh;
      }
      .bar {
        display: flex; align-items: center; gap: 10px; flex: 0 0 auto;
        padding: 10px 14px; background: #fafafa; border-bottom: 1px solid #e3e3e6;
      }
      .qbox { position: relative; flex: 1; display: flex; }
      .bar input.q {
        flex: 1; min-width: 120px; height: 34px; padding: 0 12px;
        border: 1px solid #c9c9cf; border-radius: 8px; font: inherit; outline: none;
      }
      .bar input.q:focus { border-color: #5aa0ff; }
      .qhistory {
        position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 30;
        background: #fff; border: 1px solid #ccc; border-radius: 8px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.18); padding: 4px; display: none;
        max-height: 260px; overflow-y: auto;
      }
      .qhistory.show { display: block; }
      .qh-item { display: flex; align-items: center; gap: 8px; padding: 7px 9px;
        border-radius: 6px; cursor: pointer; font-size: 13px; color: #333; }
      .qh-item:hover { background: #eef2ff; }
      .qh-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .qh-del { color: #bbb; flex: 0 0 auto; padding: 0 4px; }
      .qh-del:hover { color: #e85c50; }
      .qh-empty { padding: 8px 9px; color: #aaa; font-size: 13px; }
      .bar button {
        height: 34px; padding: 0 14px; border: 1px solid #c9c9cf; border-radius: 8px;
        background: #fff; cursor: pointer; font: inherit;
      }
      .bar button:hover { background: #eef2ff; border-color: #93b4ff; }
      .bar select { height: 34px; border: 1px solid #c9c9cf; border-radius: 8px; background: #fff; font: inherit; padding: 0 6px; }
      .modes { display: inline-flex; border: 1px solid #c9c9cf; border-radius: 8px; overflow: hidden; }
      .mode { height: 34px; padding: 0 12px; border: none; background: #fff; cursor: pointer; font: inherit; color: #555; }
      .mode + .mode { border-left: 1px solid #c9c9cf; }
      .mode.active { background: #2b6cff; color: #fff; }
      .bbtn { height: 34px; padding: 0 12px; border: 1px solid #c9c9cf; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; }
      .bbtn:hover { background: #eef2ff; border-color: #93b4ff; }
      .bbtn:disabled { color: #aaa; cursor: default; background: #f3f3f5; }
      .sem-progress { padding: 0 16px; color: #5a78d0; font-size: 12px; }
      .sem-progress:empty { display: none; }
      .hit .score { color: #d08a2b; font-size: 11px; margin-right: 8px; }
      .summary { padding: 8px 16px; color: #777; font-size: 13px; flex: 0 0 auto; }
      .results { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 0 12px 16px; }

      .book-group { background: #fff; border: 1px solid #ececf0; border-radius: 10px; margin: 10px 2px; overflow: hidden; }
      .book-head {
        display: flex; align-items: baseline; gap: 10px; padding: 10px 14px;
        background: #f3f5fb; border-bottom: 1px solid #eceef4; cursor: pointer;
      }
      .book-head:hover { background: #e9eefb; }
      .caret { color: #8aa0d8; font-size: 11px; flex: 0 0 auto; transition: transform 0.15s ease; }
      .book-group.collapsed .caret { transform: rotate(-90deg); }
      .book-group.collapsed .hits { display: none; }
      .book-title { font-weight: 600; font-size: 15px; }
      .book-author { color: #999; font-size: 12px; }
      .book-count { margin-left: auto; color: #5a78d0; font-size: 12px; flex: 0 0 auto; }
      .hit {
        padding: 9px 14px; border-top: 1px solid #f1f1f4; cursor: pointer;
        font-size: 13.5px; line-height: 1.7; color: #333;
      }
      .hit:hover { background: #f7f9ff; }
      .hit .ch { color: #aaa; font-size: 11px; margin-right: 8px; }
      .hit .hit-meta { color: #8a98b8; font-size: 11px; margin-right: 8px; }
      .hit mark { background: #ffe58a; color: inherit; padding: 0 1px; border-radius: 2px; }
      .more { padding: 7px 14px; color: #aaa; font-size: 12px; border-top: 1px solid #f1f1f4; }
      .empty { padding: 40px; text-align: center; color: #aaa; }
      .loading { padding: 30px; text-align: center; color: #888; }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="qbox">
        <input id="q" class="q" type="text" autocomplete="off" placeholder="输入要在书架中检索的文字…" />
        <div id="qhistory" class="qhistory"></div>
      </div>
      <button id="go">搜索</button>
      <select id="sort" title="排序">
        <option value="count">相关度</option>
        <option value="hits">命中最多</option>
        <option value="title">按书名</option>
        <option value="author">按作者</option>
      </select>
      <div class="modes">
        <button id="mode-kw" class="mode active" type="button" title="精确文字匹配">关键词</button>
        <button id="mode-sem" class="mode" type="button" title="按意思相近匹配（需先建立语义索引）">语义</button>
      </div>
      <button id="build-sem" class="bbtn" type="button" title="为全部/选定图书建立语义索引（耗时，一次性）">建立语义索引</button>
    </div>
    <div id="sem-progress" class="sem-progress"></div>
    <div id="summary" class="summary"></div>
    <div id="results" class="results"></div>
    <script src="search.js"></script>
  </body>
</html>
