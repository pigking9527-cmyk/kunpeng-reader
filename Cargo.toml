[package]
name = "ebook-reader-tauri"
version = "1.5.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2" }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"
epub = "2"
image = "0.25"
encoding_rs = "0.8"
chardetng = "0.1"
memchr = "2"
fastembed = "4"
instant-distance = { version = "0.6", features = ["with-serde"] }
bincode = "1"
pdf-extract = "0.7"
lopdf = "0.34"
chrono = "0.4"
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
futures-util = "0.3"
sha2 = "0.10"
base64 = "0.22"

# 正式发布档：满优化（体积更小、运行更快）。
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
