name: macOS Apple Silicon build

on:
  workflow_dispatch:
  push:
    branches:
      - codex/macos-build

permissions:
  contents: read

jobs:
  build:
    name: Apple Silicon app and DMG
    runs-on: macos-14
    timeout-minutes: 90
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      # Ad-hoc signing prevents Gatekeeper from treating an unsigned app bundle
      # as structurally damaged. A public release still needs Developer ID
      # signing and Apple notarization.
      APPLE_SIGNING_IDENTITY: "-"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-aarch64

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Run UI tests
        run: node --test ui/tests/*.test.cjs

      # The semantic search runtime does not ship Intel macOS prebuilt binaries.
      - name: Build Apple Silicon macOS bundles
        run: cargo tauri build --target aarch64-apple-darwin --bundles app,dmg

      - name: Verify macOS application signature
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"
          codesign --display --verbose=4 "$app_path"

      - name: Prepare artifacts and checksums
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="target/aarch64-apple-darwin/release/bundle"
          out_dir="target/macos-release"
          mkdir -p "$out_dir"

          app_path="$(find "$bundle_dir/macos" -maxdepth 1 -type d -name '*.app' -print -quit)"
          dmg_path="$(find "$bundle_dir/dmg" -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$app_path"
          test -n "$dmg_path"

          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$out_dir/Kunpeng-Reader-v1.9.0-macOS-Apple-Silicon.app.zip"
          cp "$dmg_path" "$out_dir/Kunpeng-Reader-v1.9.0-macOS-Apple-Silicon.dmg"
          (cd "$out_dir" && shasum -a 256 * > SHA256SUMS.txt)

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Kunpeng-Reader-v1.9.0-macOS-Apple-Silicon
          path: target/macos-release/*
          if-no-files-found: error
          retention-days: 14
